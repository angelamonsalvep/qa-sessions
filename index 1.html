<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login QA</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
    }

    .login-box {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: none;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .error {
      color: #f87171;
      font-size: 14px;
    }

    .success {
      color: #4ade80;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Login</h2>

  <input type="text" id="username" placeholder="Usuario">
  <input type="password" id="password" placeholder="Contraseña">

  <button onclick="login()">Entrar</button>

  <p id="message"></p>
</div>

<script>
  const VALID_USER = "admin";
  const VALID_PASS = "1234";

  function login() {
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();
    const message = document.getElementById("message");

    message.innerText = "";
    message.className = "";

    // Validación básica
    if (user === "" || pass === "") {
      message.innerText = "Todos los campos son obligatorios";
      message.className = "error";
      return;
    }

    // Simulación de tiempo de respuesta
    message.innerText = "Validando...";
    
    setTimeout(() => {

      if (user === VALID_USER && pass === VALID_PASS) {
        message.innerText = "Login exitoso";
        message.className = "success";
      } else {
        message.innerText = "Usuario o contraseña incorrectos";
        message.className = "error";
      }

    }, 5000); // 1 segundo de delay

  }
</script>

</body>
</html>
